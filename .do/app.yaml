name: spacelift
region: nyc
services:
  - name: web
    github:
      repo: batra98/spacelift
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: UNKEY_ROOT_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
